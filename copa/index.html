<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Guia Copa 2026 — dicas de nutrição da Marcela Tupinambá para curtir o mundial com equilíbrio.">
  <title>Guia Copa 2026 | Marcela Tupinambá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #faf8f4;
      --color-text: #2c2a26;
      --color-accent: #5a7a5e;
      --color-border: #e5dfd6;
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Outfit", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--color-border);
      background: rgba(250, 248, 244, 0.95);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--color-text);
      text-decoration: none;
    }

    .back-link {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--color-accent);
      text-decoration: none;
      white-space: nowrap;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .embed-wrap {
      flex: 1;
      min-height: 0;
      padding: 0;
    }

    .embed-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 65px);
      border: 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo">Marcela Tupinambá</a>
    <a href="/" class="back-link">← Voltar ao site</a>
  </header>

  <main class="embed-wrap">
    <iframe
      src="https://claude.site/public/artifacts/54bd46ae-f82d-4ee1-869f-94057e1a6544/embed"
      title="Guia Copa 2026 — Nutri Marcela Tupi"
      allow="clipboard-write"
      allowfullscreen
    ></iframe>
  </main>
</body>
</html>
